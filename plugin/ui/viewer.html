<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Recall</title>
  <link rel="icon" type="image/webp" href="claude-mem-logomark.webp">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ==========================================================
       DARK LIBRARY THEME — copied from approved fusion design
       ========================================================== */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* --- Design Tokens: Dark Mode (default) --- */
    :root {
      --bg: #16140f;
      --bg-raised: #1d1b15;
      --bg-surface: #24211a;
      --bg-hover: #2a2720;
      --bg-glow: rgba(212, 168, 80, 0.03);
      --border: #2e2a22;
      --border-hover: #3e3828;
      --border-subtle: #252118;

      --text-1: #e8e0d0;
      --text-2: #b0a898;
      --text-3: #787060;
      --text-4: #484038;

      --amber: #d4a84c;
      --amber-dim: #a88838;
      --amber-glow: rgba(212, 168, 76, 0.12);
      --amber-subtle: rgba(212, 168, 76, 0.06);

      --teal: #5abeaa;
      --teal-subtle: rgba(90, 190, 170, 0.07);
      --plum: #a488c0;
      --plum-subtle: rgba(164, 136, 192, 0.07);
      --green: #5ab870;
      --green-glow: rgba(90, 184, 112, 0.2);
      --red: #d06050;

      --shadow: 0 1px 4px rgba(0,0,0,0.3);

      --serif: 'Newsreader', Georgia, 'Times New Roman', serif;
      --sans: 'DM Sans', -apple-system, sans-serif;
      --mono: 'JetBrains Mono', 'Monaco', 'Menlo', monospace;

      /* Legacy compat aliases */
      --color-bg-primary: var(--bg);
      --color-bg-secondary: var(--bg-surface);
      --color-bg-card: var(--bg-raised);
      --color-bg-card-hover: var(--bg-hover);
      --color-bg-header: var(--bg);
      --color-bg-input: var(--bg-surface);
      --color-border-primary: var(--border);
      --color-border-secondary: var(--border);
      --color-text-primary: var(--text-1);
      --color-text-secondary: var(--text-2);
      --color-text-tertiary: var(--text-3);
      --color-text-muted: var(--text-4);
      --color-accent-primary: var(--amber);
      --color-accent-success: var(--green);
      --color-accent-error: var(--red);
      --color-type-badge-bg: var(--teal-subtle);
      --color-type-badge-text: var(--teal);
      --color-summary-badge-bg: var(--amber-subtle);
      --color-summary-badge-text: var(--amber);
      --color-prompt-badge-bg: var(--plum-subtle);
      --color-prompt-badge-text: var(--plum);
      --font-terminal: var(--mono);
      --color-bg-scrollbar-track: var(--bg);
      --color-bg-scrollbar-thumb: var(--border);
      --color-bg-scrollbar-thumb-hover: var(--border-hover);
    }

    /* --- Design Tokens: Light Mode --- */
    [data-theme="light"] {
      --bg: #faf5ea;
      --bg-raised: #faf5ea;
      --bg-surface: #f0eade;
      --bg-hover: #ede6d6;
      --bg-glow: rgba(180, 140, 50, 0.04);
      --border: #ddd4c0;
      --border-hover: #c8be9e;
      --border-subtle: #e8e0d0;

      --text-1: #1e1a14;
      --text-2: #504838;
      --text-3: #8a7e6e;
      --text-4: #c0b8a4;

      --amber: #a87830;
      --amber-dim: #8a6228;
      --amber-glow: rgba(168, 120, 48, 0.1);
      --amber-subtle: rgba(168, 120, 48, 0.06);

      --teal: #1a7a6a;
      --teal-subtle: rgba(26, 122, 106, 0.06);
      --plum: #6a4880;
      --plum-subtle: rgba(106, 72, 128, 0.06);
      --green: #3a7a3a;
      --green-glow: rgba(58, 122, 58, 0.15);
      --red: #b04030;

      --shadow: 0 1px 3px rgba(30,26,20,0.06);
    }

    /* --- Base --- */
    html { font-size: 16px; -webkit-font-smoothing: antialiased; }
    body {
      font-family: var(--sans); background: var(--bg); color: var(--text-1);
      line-height: 1.65; transition: background .3s, color .3s;
    }

    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 9999; pointer-events: none;
      opacity: 0.015;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

    /* ==========================================================
       HEADER — from fusion design
       ========================================================== */
    .header {
      max-width: 640px; margin: 0 auto;
      padding: 40px 32px 0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green-glow);
      animation: pulse 3s ease infinite;
      flex-shrink: 0;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .logo-dot.offline { background: var(--red); box-shadow: none; animation: none; }

    .logo-text {
      font-family: var(--serif); font-size: 20px; font-weight: 500;
      color: var(--text-1); letter-spacing: -0.01em;
    }
    .logo-text em { font-style: italic; color: var(--amber); }

    .hdr-r { display: flex; align-items: center; gap: 2px; }
    .queue-badge {
      font-family: var(--mono); font-size: 10px; color: var(--text-3);
      padding: 2px 8px; border: 1px solid var(--border);
      border-radius: 3px; letter-spacing: .02em; margin-right: 8px;
    }
    .queue-badge strong { color: var(--amber); }
    .project-select {
      font-family: var(--mono); font-size: 11px; color: var(--text-3);
      background: transparent; border: 1px solid var(--border); border-radius: 4px;
      padding: 4px 8px; cursor: pointer; outline: none; margin-right: 4px;
    }
    .project-select option { background: var(--bg-raised); color: var(--text-1); }

    .icon-btn {
      width: 32px; height: 32px; border: none; background: none; color: var(--text-3);
      cursor: pointer; border-radius: 6px; display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .icon-btn:hover { color: var(--text-1); background: var(--amber-subtle); }
    .icon-btn svg { width: 16px; height: 16px; }

    .header-divider {
      max-width: 640px; margin: 20px auto 0;
      border: none; border-top: 1px solid var(--border);
    }

    /* ==========================================================
       TOOLBAR — from fusion design
       ========================================================== */
    .toolbar {
      max-width: 640px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 32px;
    }
    .toolbar-left { display: flex; align-items: center; gap: 6px; }
    .toolbar-right { display: flex; align-items: center; gap: 10px; }

    .pill {
      font-family: var(--mono); padding: 4px 12px;
      font-size: 10px; font-weight: 500; color: var(--text-4);
      background: none; border: 1px solid var(--border); border-radius: 3px;
      cursor: pointer; letter-spacing: .03em; transition: all .12s;
    }
    .pill:hover { border-color: var(--text-3); color: var(--text-2); }
    .pill.on { background: var(--amber); color: var(--bg); border-color: var(--amber); }
    .pill .count { font-variant-numeric: tabular-nums; margin-left: 4px; opacity: 0.6; }
    .pill.on .count { opacity: 0.8; }

    .view-toggle {
      display: flex; background: var(--bg-surface); border-radius: 4px;
      padding: 2px; gap: 1px;
    }
    .view-toggle button {
      width: 28px; height: 24px; border: none; background: none;
      color: var(--text-4); cursor: pointer; border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      transition: all .12s;
    }
    .view-toggle button:hover { color: var(--text-2); }
    .view-toggle button.on { background: var(--border); color: var(--text-1); }
    .view-toggle button svg { width: 14px; height: 14px; }

    /* ==========================================================
       FEED
       ========================================================== */
    .feed { max-width: 640px; margin: 0 auto; padding: 8px 32px 100px; }
    .feed-content { /* wrapper used by React */ }

    /* ==========================================================
       CARDS — divider-separated, from fusion design
       ========================================================== */
    .card {
      border-bottom: 1px solid var(--border-subtle);
      padding: 20px 0;
      transition: background .15s;
      cursor: pointer;
    }
    .card:first-child { padding-top: 4px; }
    .card:hover {
      background: var(--bg-glow);
      margin: 0 -16px; padding-left: 16px; padding-right: 16px;
      border-radius: 8px;
    }

    /* --- Card header (React: .card-header, .card-header-left) --- */
    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .card-header-left { display: flex; align-items: center; gap: 8px; }

    /* --- Type badges (React: .card-type) --- */
    .card-type {
      font-family: var(--mono); font-size: 10px; font-weight: 500;
      letter-spacing: .04em; display: inline-flex; align-items: center; gap: 5px;
      color: var(--teal);
    }
    .card-type::before {
      content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 1px;
      background: var(--teal);
    }

    /* Type-specific colors */
    .card-type.type-discovery, .card-type.type-change, .card-type.type-refactor,
    .card-type.type-feature, .card-type.type-bugfix, .card-type.type-decision {
      color: var(--teal);
    }
    .card-type.type-discovery::before, .card-type.type-change::before, .card-type.type-refactor::before,
    .card-type.type-feature::before, .card-type.type-bugfix::before, .card-type.type-decision::before {
      background: var(--teal);
    }
    .card-type.summary-badge, .summary-badge {
      color: var(--amber);
    }
    .card-type.summary-badge::before, .summary-badge::before {
      content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 1px;
      background: var(--amber); box-shadow: 0 0 6px var(--amber-glow);
    }

    /* Prompt cards */
    .prompt-card .card-type {
      color: var(--plum);
    }
    .prompt-card .card-type::before {
      background: var(--plum);
    }

    /* Project badge */
    .card-project, .summary-project-badge {
      font-family: var(--mono); font-size: 10px; color: var(--text-4);
    }

    /* --- Card title (React: .card-title, .summary-title) --- */
    .card-title, .summary-title {
      font-family: var(--serif); font-size: 19px; font-weight: 500;
      color: var(--text-1); line-height: 1.4; letter-spacing: -0.005em;
      margin-bottom: 6px;
    }

    /* --- Card subtitle --- */
    .card-subtitle {
      font-family: var(--sans); font-size: 14px; color: var(--text-2);
      line-height: 1.55;
    }

    /* --- Card content area --- */
    .view-mode-content { margin-top: 4px; }
    .card-content {
      font-family: var(--serif); font-size: 16px; font-style: italic;
      color: var(--text-2); line-height: 1.7; margin: 10px 0;
      padding-left: 18px; border-left: 2px solid var(--plum);
    }

    /* --- View mode toggles (facts/narrative buttons) --- */
    .view-mode-toggles { display: flex; gap: 4px; }
    .view-mode-toggle {
      font-family: var(--mono); font-size: 10px;
      padding: 3px 8px; background: none;
      border: 1px solid var(--border); border-radius: 3px;
      color: var(--text-4); cursor: pointer;
      display: inline-flex; align-items: center; gap: 4px;
      transition: all .12s;
    }
    .view-mode-toggle:hover { border-color: var(--text-3); color: var(--text-2); }
    .view-mode-toggle.active { border-color: var(--amber-dim); color: var(--amber); }
    .view-mode-toggle svg { stroke: currentColor; }

    /* --- Narrative --- */
    .narrative {
      font-family: var(--sans); font-size: 14px; color: var(--text-2);
      line-height: 1.8; margin: 12px 0 20px;
      text-wrap: pretty; max-width: 560px;
    }

    /* --- Facts list --- */
    .facts-list, .facts {
      list-style: none; margin: 12px 0 20px;
      border-left: 2px solid var(--amber-dim);
      padding-left: 16px;
    }
    .facts-list li, .facts li {
      font-family: var(--sans); font-size: 13px; color: var(--text-2);
      line-height: 1.6; padding: 4px 0;
    }
    .facts-list li::before, .facts li::before {
      content: ''; display: inline-block; width: 4px; height: 4px;
      border-radius: 50%; background: var(--amber); margin-right: 8px;
      vertical-align: middle;
    }

    /* --- Card meta / footer --- */
    .card-meta, .summary-card-footer {
      margin-top: 14px;
      display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
    }
    .meta-date, .summary-meta-id, .summary-meta-date, .summary-meta-divider {
      font-family: var(--mono); font-size: 10px; color: var(--text-4);
    }
    .meta-files {
      font-family: var(--mono); font-size: 10px; color: var(--text-3);
    }
    .file-label { color: var(--text-4); font-weight: 500; }

    /* --- Concept tags (inline in card-meta) --- */
    .card-meta span[style] {
      /* Override inline styles from React with our design tokens */
    }

    /* ==========================================================
       SUMMARY CARD — from fusion design
       ========================================================== */
    .summary-card { /* inherits .card */ }
    .summary-card-header { margin-bottom: 4px; }
    .summary-badge-row {
      display: flex; gap: 8px; align-items: center;
      margin-bottom: 10px;
    }

    .summary-sections {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
      margin-top: 16px;
    }
    .summary-section {
      padding: 16px 18px; background: var(--bg-surface); border-radius: 8px;
      border-left: 2px solid var(--amber-dim);
    }
    .summary-section-header {
      display: flex; gap: 8px; align-items: center; margin-bottom: 6px;
    }
    .summary-section-icon {
      width: 18px; height: 18px; opacity: 0.6;
    }
    .summary-section-label {
      font-family: var(--serif); font-size: 11px; font-weight: 500;
      font-style: italic; color: var(--amber); margin: 0;
    }
    .summary-section-content {
      font-family: var(--sans); font-size: 13px; color: var(--text-2);
      line-height: 1.65;
    }

    /* ==========================================================
       PROMPT CARD — from fusion design
       ========================================================== */
    .prompt-card .card-content {
      font-family: var(--serif); font-size: 16px; font-style: italic;
      color: var(--text-2); line-height: 1.7; margin: 10px 0;
      padding-left: 18px; border-left: 2px solid var(--plum);
    }

    /* ==========================================================
       CONSOLE DRAWER
       ========================================================== */
    .console-toggle-btn {
      position: fixed; bottom: 12px; left: 12px;
      width: 36px; height: 36px;
      background: var(--bg-raised); border: 1px solid var(--border);
      border-radius: 6px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text-3); z-index: 40;
      box-shadow: var(--shadow); transition: all .15s;
    }
    .console-toggle-btn:hover { color: var(--text-1); border-color: var(--border-hover); }
    .console-toggle-btn svg { width: 16px; height: 16px; }

    .console-drawer {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #0d0c0a; border-top: 1px solid var(--border);
      z-index: 50; display: flex; flex-direction: column;
      font-family: var(--mono);
    }
    .console-resize-handle {
      height: 6px; cursor: ns-resize; display: flex;
      align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .console-resize-bar {
      width: 32px; height: 3px; background: rgba(255,255,255,0.1);
      border-radius: 2px;
    }
    .console-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 16px 4px; border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }
    .console-tabs { display: flex; gap: 8px; }
    .console-tab {
      font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.5);
      text-transform: uppercase; letter-spacing: .06em;
      cursor: pointer; padding: 4px 0;
    }
    .console-tab.active { color: rgba(255,255,255,0.8); }
    .console-controls { display: flex; gap: 4px; align-items: center; }
    .console-control-btn {
      font-family: var(--mono); font-size: 10px; padding: 2px 8px;
      background: rgba(255,255,255,0.06); border: none; border-radius: 3px;
      color: rgba(255,255,255,0.4); cursor: pointer; transition: all .1s;
    }
    .console-control-btn:hover { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); }
    .console-clear-btn:hover { color: var(--red); }
    .console-auto-refresh {
      font-size: 10px; color: rgba(255,255,255,0.4);
      display: flex; align-items: center; gap: 4px; cursor: pointer;
    }
    .console-auto-refresh input { cursor: pointer; }

    .console-filters {
      display: flex; gap: 8px; padding: 6px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0; flex-wrap: wrap;
    }
    .console-filter-section { display: flex; align-items: center; gap: 4px; }
    .console-filter-label {
      font-size: 10px; color: rgba(255,255,255,0.3);
      text-transform: uppercase; letter-spacing: .04em;
    }
    .console-filter-chips { display: flex; gap: 3px; }
    .console-filter-chip {
      font-family: var(--mono); font-size: 10px; font-weight: 500;
      padding: 2px 8px; border-radius: 3px;
      background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.3);
      border: none; cursor: pointer; transition: all .1s;
    }
    .console-filter-chip:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.5); }
    .console-filter-chip.active { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); }
    .console-filter-action {
      font-family: var(--mono); font-size: 9px; padding: 2px 6px;
      background: none; border: none; color: rgba(255,255,255,0.2);
      cursor: pointer; text-decoration: underline;
    }
    .console-filter-action:hover { color: rgba(255,255,255,0.5); }

    .console-content { flex: 1; overflow-y: auto; padding: 8px 16px; }
    .console-logs { font-size: 11px; line-height: 1.8; }
    .console-error { padding: 8px 16px; color: var(--red); font-size: 11px; }

    .log-line { color: rgba(255,255,255,0.5); white-space: nowrap; }
    .log-line-raw { color: rgba(255,255,255,0.4); }
    .log-line-empty { color: rgba(255,255,255,0.2); text-align: center; padding: 20px; }
    .log-timestamp { color: rgba(255,255,255,0.2); margin-right: 6px; }
    .log-level { font-weight: 600; margin-right: 6px; }
    .log-component { margin-right: 6px; }
    .log-correlation { color: rgba(255,255,255,0.2); margin-right: 6px; }
    .log-message { color: rgba(255,255,255,0.6); }

    /* ==========================================================
       SETTINGS MODAL (ContextSettingsModal)
       ========================================================== */
    .modal-backdrop {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
    }
    .context-settings-modal {
      background: var(--bg-raised); border: 1px solid var(--border);
      border-radius: 14px; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      width: 90vw; max-width: 800px; max-height: 85vh;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .modal-header h2 {
      font-family: var(--serif); font-size: 16px; font-weight: 600;
      color: var(--text-1);
    }
    .modal-close {
      width: 28px; height: 28px; border: none; background: none;
      color: var(--text-3); cursor: pointer; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
    }
    .modal-close:hover { color: var(--text-1); background: var(--amber-subtle); }
    .modal-body { overflow-y: auto; flex: 1; }
    .modal-body-inner { padding: 16px 20px; }

    .settings-section-collapsible {
      border-bottom: 1px solid var(--border);
    }
    .settings-section-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px; cursor: pointer; transition: background .1s;
    }
    .settings-section-header:hover { background: var(--bg-hover); }
    .settings-section-header h3 {
      font-family: var(--mono); font-size: 12px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .06em; color: var(--text-2);
    }
    .settings-section-body { padding: 0 20px 16px; }

    .settings-row {
      display: flex; flex-direction: column; gap: 4px; margin-bottom: 14px;
    }
    .settings-label {
      font-family: var(--sans); font-size: 12px; font-weight: 500; color: var(--text-2);
    }
    .settings-input, .settings-select {
      font-family: var(--mono); font-size: 13px;
      padding: 8px 12px; background: var(--bg-surface);
      border: 1px solid var(--border); border-radius: 6px;
      color: var(--text-1); outline: none; transition: border-color .15s;
    }
    .settings-input:focus, .settings-select:focus { border-color: var(--amber); }

    /* Toggle switch */
    .toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 0;
    }
    .toggle-label {
      font-family: var(--sans); font-size: 13px; color: var(--text-2);
    }
    .toggle-switch {
      width: 40px; height: 22px; border-radius: 11px;
      background: var(--border); cursor: pointer; position: relative;
      transition: background .2s; border: none;
    }
    .toggle-switch.on { background: var(--amber); }
    .toggle-knob {
      width: 16px; height: 16px; border-radius: 50%; background: white;
      position: absolute; top: 3px; left: 3px; transition: transform .2s;
    }
    .toggle-switch.on .toggle-knob { transform: translateX(18px); }

    /* Range slider */
    .range-container { display: flex; align-items: center; gap: 12px; }
    .settings-range {
      flex: 1; -webkit-appearance: none; height: 4px;
      border-radius: 2px; background: var(--border); outline: none;
    }
    .settings-range::-webkit-slider-thumb {
      -webkit-appearance: none; width: 16px; height: 16px;
      border-radius: 50%; background: var(--amber); cursor: pointer;
      border: 2px solid var(--bg-raised);
    }
    .range-value {
      font-family: var(--mono); font-size: 13px; font-weight: 600;
      color: var(--text-1); min-width: 32px; text-align: right;
      font-variant-numeric: tabular-nums;
    }

    /* Provider tabs */
    .provider-tabs {
      display: flex; gap: 2px; margin-bottom: 14px;
      background: var(--bg-surface); padding: 3px; border-radius: 8px;
    }
    .provider-tab {
      flex: 1; padding: 6px 12px; font-family: var(--mono); font-size: 11px;
      font-weight: 500; text-align: center; border: none; background: none;
      color: var(--text-3); border-radius: 5px; cursor: pointer; transition: all .15s;
    }
    .provider-tab.active {
      background: var(--bg-raised); color: var(--text-1); box-shadow: var(--shadow);
    }

    /* Terminal preview in settings */
    .terminal-preview {
      font-family: var(--mono); font-size: 12px; line-height: 1.7;
      background: #0d0c0a; color: var(--text-2);
      border-radius: 8px; padding: 16px; margin: 12px 0;
      overflow-x: auto; white-space: pre-wrap;
      border: 1px solid var(--border);
    }

    /* Save status */
    .save-status {
      font-family: var(--mono); font-size: 11px; color: var(--green);
      display: flex; align-items: center; gap: 4px;
    }
    .save-status.error { color: var(--red); }

    /* ==========================================================
       THEME TOGGLE (renders as .icon-btn)
       ========================================================== */
    .theme-toggle-btn {
      width: 32px; height: 32px; border: none; background: none; color: var(--text-3);
      cursor: pointer; border-radius: 6px; display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .theme-toggle-btn:hover { color: var(--text-1); background: var(--amber-subtle); }
    .theme-toggle-btn svg { width: 16px; height: 16px; }

    /* ==========================================================
       SCROLL TO TOP
       ========================================================== */
    .scroll-to-top {
      position: fixed; bottom: 16px; right: 16px;
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--bg-raised); border: 1px solid var(--border);
      color: var(--text-3); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow); z-index: 30;
      transition: all .15s; opacity: 0; pointer-events: none;
    }
    .scroll-to-top.visible { opacity: 1; pointer-events: auto; }
    .scroll-to-top:hover { color: var(--text-1); border-color: var(--border-hover); }
    .scroll-to-top svg { width: 16px; height: 16px; }

    /* ==========================================================
       ERROR BOUNDARY
       ========================================================== */
    .error-boundary {
      text-align: center; padding: 60px 32px; color: var(--text-2);
    }
    .error-boundary h2 {
      font-family: var(--serif); font-size: 18px; color: var(--text-1);
      margin-bottom: 8px;
    }
    .error-boundary p { font-size: 14px; margin-bottom: 16px; }
    .error-boundary button {
      font-family: var(--mono); font-size: 12px;
      padding: 8px 16px; background: var(--amber); color: var(--bg);
      border: none; border-radius: 6px; cursor: pointer;
    }

    /* ==========================================================
       GITHUB STARS
       ========================================================== */
    .github-stars-btn {
      font-family: var(--mono); font-size: 11px;
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; border: 1px solid var(--border);
      border-radius: 4px; color: var(--text-3); background: none;
      text-decoration: none; transition: all .12s;
    }
    .github-stars-btn:hover { border-color: var(--border-hover); color: var(--text-2); }
    .icon-link {
      color: var(--text-3); transition: color .12s; display: inline-flex;
    }
    .icon-link:hover { color: var(--text-1); }

    /* ==========================================================
       LOADING / SPINNER / EMPTY
       ========================================================== */
    .spinner {
      width: 16px; height: 16px; border: 2px solid var(--border);
      border-top-color: var(--amber); border-radius: 50%;
      animation: spin 0.8s linear infinite; display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .logomark { width: 28px; height: 28px; border-radius: 8px; }
    .logomark.spinning { animation: spin 2s linear infinite; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ==========================================================
       COMMAND PALETTE (⌘K search)
       ========================================================== */
    .cmd-palette-backdrop {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
      display: flex; align-items: flex-start; justify-content: center;
      padding-top: 20vh;
    }
    .cmd-palette {
      width: 560px; max-height: 420px;
      background: var(--bg-raised); border: 1px solid var(--border);
      border-radius: 14px; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      overflow: hidden; display: flex; flex-direction: column;
    }
    .cmd-palette-input {
      padding: 16px 20px; font-size: 15px; font-family: var(--sans);
      background: transparent; border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text-1); outline: none; width: 100%;
    }
    .cmd-palette-input::placeholder { color: var(--text-4); }
    .cmd-palette-results {
      overflow-y: auto; padding: 6px; flex: 1;
    }
    .cmd-result {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; border-radius: 8px;
      cursor: pointer; transition: background .1s;
    }
    .cmd-result:hover, .cmd-result.focused { background: var(--amber-subtle); }
    .cmd-result-icon {
      width: 32px; height: 32px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .cmd-result-icon.obs { background: var(--teal-subtle); color: var(--teal); }
    .cmd-result-icon.sum { background: var(--amber-subtle); color: var(--amber); }
    .cmd-result-icon.pmt { background: var(--plum-subtle); color: var(--plum); }
    .cmd-result-text { flex: 1; min-width: 0; }
    .cmd-result-title {
      font-family: var(--sans); font-size: 13px; font-weight: 500;
      color: var(--text-1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .cmd-result-sub {
      font-family: var(--mono); font-size: 10px; color: var(--text-3);
    }
    .cmd-palette-footer {
      padding: 8px 16px; border-top: 1px solid var(--border);
      display: flex; gap: 16px;
      font-family: var(--mono); font-size: 10px; color: var(--text-4);
    }
    .cmd-palette-footer kbd {
      font-family: var(--mono); font-size: 10px; padding: 1px 5px;
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: 3px;
    }

    /* ==========================================================
       SESSION TIMELINE VIEW
       ========================================================== */
    .timeline-container {
      max-width: 640px; margin: 0 auto; padding: 20px 32px 100px;
    }
    .timeline {
      position: relative; padding-left: 28px;
    }
    .timeline::before {
      content: ''; position: absolute;
      left: 7px; top: 8px; bottom: 8px;
      width: 2px; background: var(--border); border-radius: 1px;
    }
    .timeline-group-label {
      font-family: var(--mono); font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .06em;
      color: var(--text-4); margin-bottom: 12px; margin-top: 24px;
    }
    .timeline-group-label:first-child { margin-top: 0; }
    .session-card {
      position: relative;
      background: var(--bg-raised); border: 1px solid var(--border);
      border-radius: 10px; padding: 16px 18px; margin-bottom: 12px;
      cursor: pointer; transition: all .15s;
    }
    .session-card::before {
      content: ''; position: absolute;
      left: -24px; top: 22px;
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--bg); border: 2px solid var(--amber);
    }
    .session-card:hover {
      border-color: var(--amber-dim); box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .session-card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 6px;
    }
    .session-project {
      font-family: var(--mono); font-size: 11px; font-weight: 600;
      color: var(--amber); padding: 2px 7px;
      background: var(--amber-subtle); border-radius: 4px;
    }
    .session-time {
      font-family: var(--mono); font-size: 11px; color: var(--text-4);
      font-variant-numeric: tabular-nums;
    }
    .session-summary-text {
      font-family: var(--sans); font-size: 13px; color: var(--text-2);
      line-height: 1.55; margin-bottom: 10px;
    }
    .session-metrics { display: flex; gap: 16px; }
    .session-metric {
      font-family: var(--mono); font-size: 11px; color: var(--text-3);
      display: flex; align-items: center; gap: 4px;
    }
    .session-metric strong {
      color: var(--text-2); font-weight: 600; font-variant-numeric: tabular-nums;
    }

    /* ==========================================================
       RESPONSIVE
       ========================================================== */
    @media (max-width: 768px) {
      .header { padding: 24px 16px 0; gap: 8px; }
      .header-divider { margin: 16px auto 0; }
      .logo-text { font-size: 16px; white-space: nowrap; }
      .toolbar { padding: 12px 16px; }
      .toolbar-left { overflow-x: auto; -webkit-overflow-scrolling: touch; flex-shrink: 1; min-width: 0; }
      .toolbar-left::-webkit-scrollbar { display: none; }
      .pill { flex-shrink: 0; }
      .feed { padding: 8px 16px 80px; }
      .header, .header-divider, .toolbar, .feed, .timeline-container { max-width: 100%; }
      .summary-sections, .quad { grid-template-columns: 1fr; }
      .title { font-size: 16px; }
      .hdr-r { gap: 0; }
      .project-select { max-width: 100px; font-size: 10px; }
      .queue-badge { display: none; }
      .context-settings-modal { width: 95vw; max-height: 90vh; border-radius: 10px; }
      .cmd-palette { width: 95vw; border-radius: 10px; }
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script src="viewer-bundle.js"></script>
</body>

</html>
